<div class="min-h-screen bg-surface">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h1 class="text-2xl sm:text-3xl font-bold text-neutral-900">
                {{ pageTitles.CART }}
            </h1>
            <p class="text-neutral-500 mt-1 text-sm">
                {{ pageSubtitles.CART }}
            </p>
        </div>
        <div class="flex border-b border-border mb-8">
            <a routerLink="items" routerLinkActive="border-primary-600 text-primary-600"
                [routerLinkActiveOptions]="{ exact: true }" class="flex items-center gap-2 px-4 sm:px-5 py-3 text-sm font-semibold
            transition-all duration-150 border-b-2 border-transparent -mb-px
            text-neutral-500 hover:text-neutral-700 hover:border-neutral-300">
                <lucide-icon [img]="CartIcon" [size]="16" />
                <span>{{ tabLabels.CART }}</span>
                @if (cartState.totalItems() > 0) {
                <span class="bg-primary-600 text-white text-[10px] font-bold
                         px-1.5 py-0.5 rounded-badge min-w-[18px] text-center">
                    {{ cartState.totalItems() }}
                </span>
                }
            </a>
            <a routerLink="contact" routerLinkActive="border-primary-600 text-primary-600" class="flex items-center gap-2 px-4 sm:px-5 py-3 text-sm font-semibold
            transition-all duration-150 border-b-2 border-transparent -mb-px
            text-neutral-500 hover:text-neutral-700 hover:border-neutral-300">
                <lucide-icon [img]="MailIcon" [size]="16" />
                <span>{{ tabLabels.CONTACT }}</span>
            </a>
        </div>
        <router-outlet />
    </div>
</div>

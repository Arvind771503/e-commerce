<div class="bg-white rounded-card border border-border overflow-hidden
hover:shadow-card-hover hover:-translate-y-0.5
transition-all duration-200 flex flex-col">

    <!-- Product Image -->
    <div class="relative overflow-hidden bg-neutral-50 aspect-[4/3]">
        <img [src]="product().image" [alt]="product().name"
            class="w-full h-full object-cover hover:scale-105 transition-transform duration-300" loading="lazy"
            (error)="onImgError($event)" />

        <!-- Category Badge -->
        <span class="absolute top-3 left-3 text-[11px] font-semibold px-2.5 py-1
     rounded-badge backdrop-blur-sm" [class]="categoryBadgeClass()">
            {{ product().category }}
        </span>

        <!-- Out of Stock Overlay -->
        @if (product().stock === 0) {
        <div class="absolute inset-0 bg-white/70 flex items-center justify-center">
            <span class="text-xs font-semibold text-error bg-error-light
         px-3 py-1 rounded-badge">
                {{ outOfStockLabel }}
            </span>
        </div>
        }
    </div>

    <!-- Card Body -->
    <div class="flex flex-col flex-1 p-4 gap-3">
        <div class="flex-1">
            <h3 class="text-sm font-semibold text-neutral-800 leading-snug line-clamp-1 mb-1">
                {{ product().name }}
            </h3>
            <p class="text-xs text-neutral-400 line-clamp-2 leading-relaxed">
                {{ product().description }}
            </p>
        </div>

        <!-- Rating + Stock -->
        <div class="flex items-center gap-1">
            <lucide-icon [img]="StarIcon" [size]="12" class="text-warning fill-warning" />
            <span class="text-xs font-medium text-neutral-600">
                {{ product().rating }}
            </span>
            <span class="text-xs text-neutral-300">•</span>
            <span class="text-xs text-neutral-400">
                {{ inStockLabel() }}
            </span>
        </div>

        <!-- Price + CTA -->
        <div class="flex items-center justify-between gap-2 pt-1
    border-t border-border">
            <span class="text-base font-bold text-primary-600">
                ₹{{ product().price.toLocaleString('en-IN') }}
            </span>

            @if (isInCart()) {
            <button (click)="removeFromCart.emit(product().id)" class="flex items-center gap-1.5 px-3 py-2 rounded-btn text-xs
     font-semibold bg-success-light text-success border
     border-success/30 hover:bg-error-light hover:text-error
     hover:border-error/30 transition-colors">
                <lucide-icon [img]="CheckIcon" [size]="13" />
                <span>{{ addedLabel }}</span>
            </button>
            } @else {
            <button (click)="addToCart.emit(product())" [disabled]="product().stock === 0" class="flex items-center gap-1.5 px-3 py-2 rounded-btn text-xs
     font-semibold bg-primary-600 text-white
     hover:bg-primary-700 transition-colors
     disabled:opacity-40 disabled:cursor-not-allowed">
                <lucide-icon [img]="CartIcon" [size]="13" />
                <span>{{ addToCartLabel }}</span>
            </button>
            }
        </div>
    </div>
</div>

<div class="flex flex-col items-center justify-center py-24 px-4 text-center">
    <div class="w-20 h-20 bg-primary-50 rounded-card flex items-center
                justify-center mb-5">
        <lucide-icon [img]="PackageOpenIcon" [size]="36" class="text-primary-300" />
    </div>
    <h3 class="text-lg font-semibold text-neutral-700 mb-2">{{ title() }}</h3>
    <p class="text-sm text-neutral-400 max-w-xs leading-relaxed">{{ message() }}</p>
    @if (actionLabel()) {
    <button (click)="actionClick.emit()" class="mt-6 px-5 py-2.5 bg-primary-600 text-white text-sm font-semibold
               rounded-btn hover:bg-primary-700 transition-colors">
        {{ actionLabel() }}
    </button>
    }
</div>
